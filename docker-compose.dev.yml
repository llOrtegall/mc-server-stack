# ─────────────────────────────────────────────────────────────────────────────
# Desarrollo local — solo infraestructura base
# mc-api y mc-panel corren fuera de Docker (bun --watch / next dev)
#
# Uso: docker compose -f docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcpanel}
      POSTGRES_USER: ${POSTGRES_USER:-mcadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcadmin} -d ${POSTGRES_DB:-mcpanel}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-dev-data:
