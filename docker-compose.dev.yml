# ─────────────────────────────────────────────────────────────────────────────
# Desarrollo local — solo infraestructura base
# mc-api y mc-panel corren fuera de Docker (bun --watch / next dev)
#
# Uso: docker compose -f docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: mc-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcpanel
      POSTGRES_USER: mcadmin
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcadmin -d mcpanel"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-dev-data:
