version: "3.9"

services:
  # ─────────────────────────────────────────
  # Nginx Proxy Manager — Reverse proxy + SSL
  # ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81" # NPM Admin UI — bloquear en firewall, solo acceso local/VPN
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcpanel}
      POSTGRES_USER: ${POSTGRES_USER:-mcadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcadmin} -d ${POSTGRES_DB:-mcpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis 7 — Socket.io adapter + rate limiting
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # mc-api — Backend Express + TypeScript
  # ─────────────────────────────────────────
  mc-api:
    build:
      context: ./mc-api
      dockerfile: Dockerfile
      target: production
    container_name: mc-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcadmin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcpanel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mc-backups}
      # Minecraft servers data directory (dentro del contenedor)
      MC_DATA_PATH: /data/servers
      # Auto-shutdown (minutos sin jugadores antes de apagar)
      AUTO_SHUTDOWN_MINUTES: ${AUTO_SHUTDOWN_MINUTES:-10}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - mc-servers-data:/data/servers
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # mc-panel — Frontend Next.js
  # ─────────────────────────────────────────
  mc-panel:
    build:
      context: ./mc-panel
      dockerfile: Dockerfile
      target: production
    container_name: mc-panel
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.lortegal.com}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.lortegal.com}
    networks:
      - proxy
    depends_on:
      - mc-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  npm-data:
  npm-letsencrypt:
  postgres-data:
  redis-data:
  mc-servers-data:    # Mundos y configs de todos los servidores Minecraft

networks:
  proxy:
    name: proxy
    driver: bridge
  internal:
    name: internal
    driver: bridge
    internal: true   # Sin acceso a internet directo — solo comunicación inter-servicios
